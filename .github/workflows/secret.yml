name: Traffic Metrics
on:
  schedule: [{cron: "0 16 * * *"}] # 每天北京时间 00:00 更新
  workflow_dispatch:               # 允许手动点击运行
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # 还是用你自己的 Token
          user: Lancy-cloud       # <--- 填你想偷窥的大佬名字
          
          # ❌ 必须关闭流量 (否则会报错 403)
          plugin_traffic: no   
          
          # ✅ 开启公开分析 (比如看他的编程语言习惯)
          plugin_languages: yes
          plugin_isocalendar: yes # 看他最近哪天在写代码

          
          template: classic
          base: ""             # 关闭基础信息，专注显示流量
          config_timezone: Asia/Shanghai
          filename: github-secret-traffic.svg

          




          
